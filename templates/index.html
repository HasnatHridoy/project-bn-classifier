<!DOCTYPE html>
<html>

<head>
    <title>Bangla News Classifier</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            display: none;
        }
    </style>
</head>

<body>
    <h2>Bangla News Classifier</h2>
    <textarea id="newsText" placeholder="Enter news text here..."></textarea>
    <button onclick="sendPredict()">Predict Category</button>

    <div id="result">
        <strong>Result:</strong>
        <pre id="jsonOutput"></pre>
    </div>

    <script>
        async function sendPredict() {
            const text = document.getElementById('newsText').value;
            const resBox = document.getElementById('result');
            const output = document.getElementById('jsonOutput');

            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            resBox.style.display = 'block';
            
            let formatted = "Top Results:\n";
            data.confidences.forEach(item => {
                formatted += `- ${item.label}: ${(item.confidence * 100).toFixed(2)}%\n`;
            });
            output.textContent = formatted;
        }
    </script>
</body>

</html>
